<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Tiempo Real</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 80%;
        }
        h1 {
            font-size: 1.2rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0;
        }
        #contador {
            font-size: 3.5rem;
            font-weight: 800;
            color: #007bff;
            margin: 0.5rem 0;
            line-height: 1.2;
        }
        .detalle {
            font-size: 1.1rem;
            color: #444;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Han pasado</h1>
        <div id="contador">Cargando...</div>
        <p class="detalle">"Y si llego a ganar más que usted que opinaria jaajjajaajjaa"</p>
    </div>

    <script>
        // Definimos la fecha de inicio (hace exactamente 2 días desde ahora al cargar por primera vez)
        // O puedes poner una fecha fija: new Date('2024-05-20T10:00:00')
        const fechaInicio = new Date();
        fechaInicio.setDate(fechaInicio.getDate() - 2);

        function actualizarContador() {
            const ahora = new Date();
            const diferenciaMS = ahora - fechaInicio;

            // Cálculos matemáticos
            const msPorDia = 1000 * 60 * 60 * 24;
            const msPorHora = 1000 * 60 * 60;
            const msPorMinuto = 1000 * 60;

            const dias = Math.floor(diferenciaMS / msPorDia);
            const horas = Math.floor((diferenciaMS % msPorDia) / msPorHora);
            const minutos = Math.floor((diferenciaMS % msPorHora) / msPorMinuto);

            // Formateo de texto
            let texto = `${dias}d ${horas}h ${minutos}m`;
            
            document.getElementById('contador').innerText = texto;
        }

        // Ejecutar inmediatamente
        actualizarContador();

        // Actualizar cada 30 segundos para ahorrar recursos (puedes bajarlo a 1000 para segundos)
        setInterval(actualizarContador, 30000);
    </script>

</body>
</html>
