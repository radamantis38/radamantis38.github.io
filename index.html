<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Días</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 1.5rem;
            color: #555;
        }
        #contador {
            font-size: 4rem;
            font-weight: bold;
            color: #007bff;
            margin: 1rem 0;
        }
        p {
            font-size: 1.1rem;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Han pasado</h1>
        <div id="contador">0</div>
        <p> Desde cuando Wilde dijo que iba a ganar más que Felipe</p>
    </div>

    <script>
        function calcularDias() {
            // Obtenemos la fecha actual
            const hoy = new Date();
            
            // Creamos la fecha de hace 2 días
            const haceDosDias = new Date();
            haceDosDias.setDate(hoy.getDate() - 2);

            // Calculamos la diferencia en milisegundos
            const diferenciaMilisegundos = hoy - haceDosDias;

            // Convertimos a días (1 día = 24h * 60m * 60s * 1000ms)
            const diasPasados = Math.floor(diferenciaMilisegundos / (1000 * 60 * 60 * 24));

            // Mostramos el resultado
            document.getElementById('contador').innerText = diasPasados + (diasPasados === 1 ? " día" : " días");
            
            // Opcional: Mostrar la fecha de inicio para referencia
            const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('fecha-referencia').innerText = `Desde el ${haceDosDias.toLocaleDateString('es-ES', opciones)}`;
        }

        // Ejecutar al cargar la página
        calcularDias();
    </script>

</body>
</html>
